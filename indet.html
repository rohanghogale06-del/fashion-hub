<!DOCTYPE html>
<html>
<head>
<title>Fashion Hub</title>
<style>
body{
font-family:Arial,sans-serif;
margin:0;
background:#f5f5f5;
text-align:center;
}
header{
background:#ff3e6c;
color:white;
padding:20px;
}
.products{
display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
padding:30px;
}
.card{
background:white;
padding:15px;
width:250px;
border-radius:10px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}
button{
background:#ff3e6c;
color:white;
border:none;
padding:10px 15px;
border-radius:5px;
cursor:pointer;
}
img{
width:100%;
border-radius:8px;
}
</style>
</head>
<body>

<header>
<h1>Fashion Hub</h1>
<p>Trending Fashion & Accessories</p>
</header>

<div class="products">

<div class="card">
<img src="https://via.placeholder.com/250x300">
<h3>Men's Shirt</h3>
<p>₹799</p>
<button>Buy Now</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/250x300">
<h3>Women's Dress</h3>
<p>₹1499</p>
<button>Buy Now</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/250x300">
<h3>Sports Shoes</h3>
<p>₹2499</p>
<button>Buy Now</button>
</div>

</div>

</body>
</html>
